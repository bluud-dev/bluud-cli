name: Release

# Manual only — publishing to npm and pushing a version tag are both
# hard-to-reverse, shared-state actions, so this never fires on a push or a
# schedule. A maintainer with repo write access must deliberately dispatch it.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    # Publishes via npm **trusted publishing** (OIDC) — there is no NPM_TOKEN
    # secret and none should be added. Before the first run, register the
    # trusted publisher on npm (the @bluud/cli package → Settings → Trusted
    # Publishing): provider GitHub Actions, repo bluud-dev/bluud-cli, workflow
    # release.yml, environment npm-publish. The `npm-publish` environment on the
    # GitHub side carries the deployment-branch restriction and required
    # reviewer — an extra manual gate on top of workflow_dispatch.
    environment: npm-publish
    permissions:
      contents: write
      # Required for OIDC trusted publishing: GitHub mints a short-lived
      # id-token that npm exchanges for a scoped, single-use publish credential
      # — no stored secret — and uses to attach provenance automatically.
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1, but the Node 22 image ships
      # npm 10.x, so the OIDC handshake in `npm publish` below is unavailable
      # until npm is upgraded. Pin to the 11.x line to get the feature without
      # inheriting a future major's behaviour changes unannounced.
      - name: Upgrade npm to a version that supports OIDC trusted publishing
        run: npm install -g "npm@^11.5.1"

      - name: Install dependencies
        run: npm ci

      # Re-verify from scratch rather than trusting a prior CI run on this
      # commit — the release workflow is the last gate before an irreversible
      # publish, so it re-derives every guarantee instead of assuming one.
      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Verify bundled skill version pin (pre-bump)
        run: node scripts/verify-skill-version.mjs

      # Pre-flight: validates that the tarball packs and the manifest is sane
      # before anything below mutates repo state. `npm pack`, not `npm publish
      # --dry-run`, on purpose: this runs at the *current* (already-published)
      # version, and a publish dry-run performs a registry collision check that
      # always fails here once any version exists ("cannot publish over
      # previously published versions"). Packing has no such check, so it
      # catches a broken tarball/manifest without a false collision. The real
      # publish is validated at the bumped version further down.
      - name: Pack dry run (pre-flight)
        run: npm pack --dry-run

      - name: Configure git identity for the version-bump commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npm version ${{ inputs.bump }} -m "v%s"

      # `npm version` does not rebuild — rebuild so dist/ (and the skill
      # version stamped into it) reflects the just-bumped version before the
      # tag is pushed or anything is published under that version number.
      - name: Rebuild at the bumped version
        run: npm run build

      - name: Verify bundled skill version pin (post-bump)
        run: node scripts/verify-skill-version.mjs

      # The real publish validation, at the just-bumped version — which does not
      # exist on the registry yet, so the collision check passes and this
      # exercises the actual tarball that will be published. Placed before the
      # push so a publish problem aborts the run without leaving a pushed tag
      # for a version that never shipped. No token/OIDC is needed: a dry run
      # only reads public registry metadata, it does not authenticate.
      - name: Publish dry run at the bumped version (pre-push gate)
        run: npm publish --dry-run

      # Push the version-bump commit and its tag before publishing. Order is
      # deliberate: the dry run above has already validated the publish, so the
      # remaining failure modes are the push itself; getting the tag onto the
      # remote first means a successful publish is always backed by a pushed
      # tag, and a push failure aborts before anything reaches the registry.
      - name: Push version commit and tag
        run: |
          git push
          git push --tags

      # Trusted publishing: no NODE_AUTH_TOKEN, and no --provenance flag —
      # npm mints the credential from the OIDC token and attaches provenance
      # automatically. --access public is still required because the package is
      # scoped (@bluud/cli), which defaults to restricted.
      - name: Publish to npm (OIDC trusted publishing)
        id: publish
        run: npm publish --access public

      - name: Create GitHub Release
        if: steps.publish.outcome == 'success'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v${VERSION}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-resolution:
    name: Verify npx @bluud/cli@latest resolves (${{ matrix.os }})
    needs: release
    strategy:
      fail-fast: false
      matrix:
        # The `release` job above stays single-runner on purpose — it publishes
        # one platform-agnostic tarball, so fanning *it* out across OSes would
        # race three jobs to publish the same version. Platform coverage for the
        # release belongs here instead: this job consumes what was just
        # published and proves it installs and runs on every OS we claim to
        # support, which is the property a user actually depends on.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # npm registry propagation after a publish is not instant. Retry with
      # backoff instead of a single fixed-delay attempt, which would be either
      # too slow (wasted CI minutes on every release) or flaky (an occasional
      # false failure on a slow propagation).
      #
      # `shell: bash` on every step below is load-bearing, not stylistic: the
      # windows runner would otherwise run these as PowerShell, where `seq` and
      # `[ ... ]` do not exist. The `tr -d '\r'` guards are load-bearing for the
      # same reason — on windows `npm`/`bluud` are .cmd shims whose stdout is
      # CRLF, and command substitution strips the trailing \n but leaves the \r,
      # so a bare comparison fails against an identical-looking version string.
      #
      # The package is scoped (`@bluud/cli`) but its bin is `bluud`, so
      # `npx @bluud/cli <args>` runs the `bluud` binary — the resolution a real
      # user performs.
      - name: Poll the registry for the version just published
        shell: bash
        run: |
          EXPECTED_VERSION=$(node -p "require('./package.json').version" | tr -d '\r')
          for attempt in $(seq 1 10); do
            PUBLISHED=$(npm view @bluud/cli@latest version 2>/dev/null | tr -d '\r' || echo "")
            if [ "$PUBLISHED" = "$EXPECTED_VERSION" ]; then
              echo "Registry has @bluud/cli@$PUBLISHED"
              exit 0
            fi
            echo "Attempt $attempt: registry has '$PUBLISHED', waiting for $EXPECTED_VERSION..."
            sleep 15
          done
          echo "::error::npm registry did not report @bluud/cli@$EXPECTED_VERSION after publish"
          exit 1

      - name: Run npx @bluud/cli@latest --version in a clean environment
        shell: bash
        run: |
          EXPECTED_VERSION=$(node -p "require('./package.json').version" | tr -d '\r')
          ACTUAL_VERSION=$(npx --yes @bluud/cli@latest --version | tr -d '\r')
          echo "npx @bluud/cli@latest --version: $ACTUAL_VERSION"
          if [ "$ACTUAL_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::npx @bluud/cli@latest resolved version $ACTUAL_VERSION, expected $EXPECTED_VERSION"
            exit 1
          fi

      - name: Run npx @bluud/cli@latest --help in a clean environment
        shell: bash
        run: npx --yes @bluud/cli@latest --help
